<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ficha de Personagem — Etherion</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Cinzel+Decorative:wght@400;700&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="etherion-ficha.css">
</head>
<body>

<!-- ===== TOP BAR ===== -->
<div class="sheet-topbar">
  <button class="sheet-back" onclick="voltarParaHome()">← Voltar</button>
  <div class="sheet-identity">
    <input class="sheet-name-input" id="f_nome" type="text" placeholder="Nome do Personagem" oninput="agendarSalvar()">
  </div>
  <span class="sheet-save-indicator" id="saveIndicator">✓ Salvo</span>
</div>

<!-- ===== TABS ===== -->
<nav class="sheet-tabs">
  <button class="sheet-tab active" data-tab="principal"  onclick="switchTab('principal')">✦ Principal</button>
  <button class="sheet-tab" data-tab="pericias"   onclick="switchTab('pericias')">◈ Perícias</button>
  <button class="sheet-tab" data-tab="grimorio"   onclick="switchTab('grimorio')">📕 Grimório Arcano</button>
  <button class="sheet-tab" data-tab="combate"    onclick="switchTab('combate')">⚔ Combate</button>
  <button class="sheet-tab" data-tab="inventario" onclick="switchTab('inventario')">⚜ Inventário</button>
  <button class="sheet-tab" data-tab="biografia"  onclick="switchTab('biografia')">📖 Biografia</button>
  <button class="sheet-tab" data-tab="notas"      onclick="switchTab('notas')">📜 Notas</button>
</nav>

<div class="sheet-wrap" id="sheetContent"></div>
<div class="toast-container" id="toastContainer"></div>

<!-- MODAL DE CONFIRMAÇÃO DE ROLL -->
<div class="roll-overlay" id="rollOverlay" onclick="fecharRoll()">
  <div class="roll-modal" id="rollModal" onclick="event.stopPropagation()">
    <div class="roll-modal-label" id="rollLabel">—</div>
    <div class="roll-modal-result" id="rollResult">—</div>
    <div class="roll-modal-detail" id="rollDetail">—</div>
    <button class="roll-modal-close" onclick="fecharRoll()">Fechar</button>
  </div>
</div>

<script src="etherion-racas.js"></script>
<script src="../../js/magias.js"></script>
<script src="../../js/origens.js"></script>
<script src="etherion-ficha.js"></script>
</body>
</html>
