<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Etherion — Criar Personagem de Teste</title>
<style>
  body { background:#0D0804; color:#F2E8D5; font-family:'Georgia',serif; display:flex; align-items:center; justify-content:center; min-height:100vh; flex-direction:column; gap:16px; }
  h2 { font-size:14px; letter-spacing:3px; color:#C9A84C; text-transform:uppercase; }
  p  { font-size:13px; color:#E0C89A; opacity:0.6; font-style:italic; }
  button {
    font-family:'Georgia',serif; font-size:11px; letter-spacing:2px; text-transform:uppercase;
    color:#C9A84C; background:none; border:1px solid rgba(201,168,76,0.4);
    padding:10px 28px; cursor:pointer; margin-top:8px;
    transition: border-color 0.2s, background 0.2s;
  }
  button:hover { border-color:#C9A84C; background:rgba(201,168,76,0.06); }
</style>
</head>
<body>
<h2>✦ Personagem de Teste — Etherion</h2>
<p>Clique para criar um personagem de teste e abrir a ficha.</p>
<button onclick="criarETester()">Criar & Abrir Ficha</button>

<script>
function criarETester() {
  const id = 'eth_teste_' + Date.now().toString(36);

  const personagem = {
    id,
    nome: 'Kael Dunmore',
    sistema: 'etherion',
    foto: null,
    dados: {
      raca: 'Humano',
      cls: 'Guerreiro',
      level: 1,
      alinhamento: 'Caótico Bom',
      antecedente: 'Mercenário',
      divindade: 'Aethos, o Eterno',
      attrs: { for: 3, cos: 2, agi: 2, int: 1, sab: 1, car: 3 },
      profBonus: 2,
      profs:    { atletismo: true, intimidacao: true, persuasao: true },
      profDiv:  { percepcao: true },
      recursos: {
        vida: { cur: 14, max: 14 },
        san:  { cur: 10, max: 10 },
        mana: { cur: 4,  max: 4  }
      },
      ca: 16,
      iniciativa: 2,
      deslocamento: '9m',
      salvaguarda: 'FOR / CON',
      estados: {
        temp: [{ texto: 'Concentrado', ativo: true }],
        perm: []
      },
      habRaciais: [
        { nome: 'Versatilidade Humana', desc: 'Ganha proficiência em uma perícia adicional à escolha do jogador.' }
      ],
      chamados: [
        { nome: 'Bênção de Aethos', desc: 'Uma vez por descanso longo, pode rolar novamente um teste qualquer.' }
      ],
      ataques: [
        { nome: 'Espada Longa', bonus: '+5', dano: '1d8+3', tipo: 'Cortante' },
        { nome: 'Arco Curto',   bonus: '+4', dano: '1d6+2', tipo: 'Perfurante' }
      ],
      magiasCombate: 'Sem magias. Habilidade: Segunda Rajada — pode atacar duas vezes na mesma ação (disponível a partir do nível 5).',
      inventario: [
        { nome: 'Espada Longa', qtd: 1, peso: '1,5kg', desc: 'Forjada em aço de Dunmore', equipado: true },
        { nome: 'Arco Curto',   qtd: 1, peso: '1kg',   desc: '',                          equipado: false },
        { nome: 'Flechas',      qtd: 20, peso: '0,5kg', desc: '',                         equipado: false },
        { nome: 'Capa de Viagem', qtd: 1, peso: '0,8kg', desc: 'Desgastada mas funcional', equipado: true },
        { nome: 'Rações (3 dias)', qtd: 1, peso: '2kg', desc: '',                         equipado: false }
      ],
      moedas: { cobre: 15, prata: 8, ouro: 2 },
      bio: {
        altura: '1,85m',
        peso: '88kg',
        idade: '27',
        corOlhos: 'Castanhos',
        aparencia: 'Alto e de ombros largos, com cicatriz no queixo esquerdo e cabelos escuros curtos.',
        idiomas: 'Comum, Élfico básico. Talento: Combate com Duas Armas.',
        historia: 'Kael cresceu nas fronteiras de Dunmore, filho de um ferreiro e uma soldada aposentada. Aos 16 anos entrou para uma guilda de mercenários, onde aprendeu a lutar e a sobreviver. Agora, anos depois, busca algo mais do que contratos — busca um propósito.',
        personalidade: 'Direto ao ponto, prefere ação à deliberação. Tem um senso de humor seco que raramente mostra.',
        ideais: 'Liberdade — ninguém deveria ser forçado a servir a quem não escolheu.',
        vinculos: 'Sua mãe ainda vive em Dunmore. Deve uma dívida de honra a Mira, a líder da guilda que o treinou.',
        defeitos: 'Confia demais na força bruta. Dificuldade em pedir ajuda mesmo quando precisa.',
      },
      notas: 'Sessão 1: Chegamos à cidade de Vaelthar. Preciso descobrir mais sobre o contrato com o Conselho.\nNPC: Mira Ashveil — líder da Guilda das Cinzas, aliada.'
    }
  };

  // Salva no localStorage (mesma chave da home-screen)
  let personagens = [];
  try { personagens = JSON.parse(localStorage.getItem('forja_personagens') || '[]'); } catch(e) {}
  // Remove personagem de teste anterior se existir
  personagens = personagens.filter(p => !p.id.startsWith('eth_teste_'));
  personagens.push(personagem);
  localStorage.setItem('forja_personagens', JSON.stringify(personagens));

  // Redireciona para a ficha
  window.location.href = `etherion-ficha.html?id=${id}&nome=${encodeURIComponent(personagem.nome)}`;
}
</script>
</body>
</html>
