<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grimório — Forja das Eras</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Cinzel+Decorative:wght@400;700&family=EB+Garamond:ital,wght@0,400;0,500;1,400;1,500&display=swap" rel="stylesheet">
<style>
:root {
  --parchment:       #F2E8D5;
  --parchment-dark:  #E0C89A;
  --ink:             #1A0E00;
  --gold:            #C9A84C;
  --gold-light:      #E8C96D;
  --gold-dark:       #8B6914;
  --blood:           #7A1818;
  --blood-light:     #A02020;
  --arcane:          #1A2E5C;
  --arcane-glow:     #4A6AAF;
  --stone:           #0D0804;
  --stone-mid:       #1C1208;
  --stone-light:     #2A1C0C;
  --ember:           #8B3A00;
  --ember-light:     #C45A10;
  --parchment-border:#B89055;
  --success-light:   #4A9A4A;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  font-family: 'EB Garamond', Georgia, serif;
  background: var(--stone);
  color: var(--parchment);
  min-height: 100vh;
}

body {
  background-image:
    radial-gradient(ellipse at 15% 30%, rgba(139,58,0,0.07) 0%, transparent 55%),
    radial-gradient(ellipse at 85% 70%, rgba(26,46,92,0.09) 0%, transparent 50%),
    url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none'%3E%3Cg fill='%23C9A84C' fill-opacity='0.025'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
}

/* ============= MODO FOCO (overlay desfocado + janela central) ============= */
.focus-backdrop {
  position: fixed; inset: 0; z-index: 50;
  background: rgba(5,3,1,0.78);
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
  display: flex; align-items: center; justify-content: center;
  padding: 24px;
}

.focus-window {
  position: relative;
  width: 100%; max-width: 880px;
  height: 88vh; max-height: 880px;
  background: var(--stone-mid);
  border: 1px solid rgba(139,105,20,0.45);
  box-shadow: 0 30px 100px rgba(0,0,0,0.95), 0 0 0 1px rgba(201,168,76,0.08);
  display: flex; flex-direction: column;
  overflow: hidden;
  animation: focusIn .28s ease-out;
}
@keyframes focusIn {
  from { opacity: 0; transform: scale(0.96) translateY(8px); }
  to   { opacity: 1; transform: scale(1) translateY(0); }
}

.corner {
  position: absolute; width: 14px; height: 14px;
  border-color: var(--gold-dark); border-style: solid; opacity: 0.6;
  z-index: 5; pointer-events: none;
}
.corner.tl { top: 8px; left: 8px; border-width: 1px 0 0 1px; }
.corner.tr { top: 8px; right: 8px; border-width: 1px 1px 0 0; }
.corner.bl { bottom: 8px; left: 8px; border-width: 0 0 1px 1px; }
.corner.br { bottom: 8px; right: 8px; border-width: 0 1px 1px 0; }

/* ===== Header da janela ===== */
.focus-header {
  background: linear-gradient(180deg, #060300 0%, var(--stone-mid) 100%);
  border-bottom: 1px solid var(--gold-dark);
  padding: 18px 26px 16px;
  display: flex; align-items: flex-start; justify-content: space-between;
  gap: 16px; flex-shrink: 0;
}
.focus-title-block { display: flex; flex-direction: column; gap: 4px; }
.focus-title {
  font-family: 'Cinzel Decorative', serif;
  font-size: 21px; color: var(--gold);
  letter-spacing: 2px; line-height: 1;
  text-shadow: 0 0 24px rgba(201,168,76,0.3);
}
.focus-subtitle {
  font-family: 'EB Garamond', serif; font-size: 13.5px; font-style: italic;
  color: var(--parchment-dark); opacity: 0.65;
}
.focus-subtitle b { color: var(--gold-light); font-style: normal; font-weight: 600; }
.focus-close {
  background: none; border: 1px solid rgba(139,105,20,0.4);
  color: var(--parchment-dark); width: 32px; height: 32px;
  border-radius: 50%; cursor: pointer; font-size: 16px;
  display: flex; align-items: center; justify-content: center;
  transition: all .15s; flex-shrink: 0;
}
.focus-close:hover { background: rgba(122,24,24,0.3); border-color: var(--blood-light); color: var(--parchment); }

/* ===== Filtros ===== */
.filters {
  padding: 14px 26px; flex-shrink: 0;
  border-bottom: 1px solid rgba(139,105,20,0.25);
  display: flex; gap: 10px; flex-wrap: wrap; align-items: center;
  background: rgba(0,0,0,0.18);
}
.search-box {
  flex: 1 1 200px; position: relative; min-width: 160px;
}
.search-box input {
  width: 100%; background: rgba(0,0,0,0.35); border: 1px solid rgba(139,105,20,0.35);
  color: var(--parchment); font-family: 'EB Garamond', serif; font-size: 14.5px;
  padding: 8px 12px 8px 32px; border-radius: 3px; outline: none;
  transition: border-color .15s;
}
.search-box input::placeholder { color: var(--parchment-dark); opacity: 0.5; font-style: italic; }
.search-box input:focus { border-color: var(--gold-dark); }
.search-icon {
  position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
  opacity: 0.45; font-size: 13px; pointer-events: none;
}

select.filter-select {
  background: rgba(0,0,0,0.35); border: 1px solid rgba(139,105,20,0.35);
  color: var(--parchment); font-family: 'Cinzel', serif; font-size: 11.5px;
  letter-spacing: 0.5px; padding: 8px 10px; border-radius: 3px; outline: none;
  cursor: pointer; transition: border-color .15s;
}
select.filter-select:focus { border-color: var(--gold-dark); }
select.filter-select option { background: var(--stone-mid); color: var(--parchment); }

.level-pills {
  display: flex; gap: 4px; flex-wrap: wrap;
}
.level-pill {
  width: 26px; height: 26px; border-radius: 50%;
  border: 1px solid rgba(139,105,20,0.4); background: rgba(0,0,0,0.3);
  color: var(--parchment-dark); font-family: 'Cinzel', serif; font-size: 11px;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: all .15s;
}
.level-pill:hover { border-color: var(--gold); color: var(--gold-light); }
.level-pill.active {
  background: var(--gold-dark); border-color: var(--gold); color: var(--ink);
  font-weight: 700; box-shadow: 0 0 12px rgba(201,168,76,0.4);
}

/* ===== Status / classe detectada ===== */
.char-status {
  padding: 10px 26px; flex-shrink: 0;
  background: rgba(26,46,92,0.12);
  border-bottom: 1px solid rgba(139,105,20,0.18);
  font-family: 'EB Garamond', serif; font-size: 13px; color: var(--parchment-dark);
  display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
}
.char-status .badge-class {
  font-family: 'Cinzel', serif; font-size: 10.5px; letter-spacing: 1px;
  color: var(--gold); background: rgba(201,168,76,0.12);
  border: 1px solid rgba(201,168,76,0.3); padding: 3px 10px; border-radius: 20px;
}
.char-status select#charPicker {
  background: rgba(0,0,0,0.3); border: 1px solid rgba(139,105,20,0.35);
  color: var(--parchment); font-family: 'EB Garamond', serif; font-size: 13px;
  padding: 4px 8px; border-radius: 3px; outline: none;
}

/* ===== Lista de magias ===== */
.spell-list {
  flex: 1; overflow-y: auto; padding: 8px 0;
}
.spell-list::-webkit-scrollbar { width: 8px; }
.spell-list::-webkit-scrollbar-thumb { background: rgba(139,105,20,0.4); border-radius: 4px; }
.spell-list::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); }

.level-group-label {
  font-family: 'Cinzel', serif; font-size: 11px; letter-spacing: 2px;
  color: var(--gold-dark); text-transform: uppercase;
  padding: 14px 26px 6px; opacity: 0.85;
}

.spell-row {
  padding: 11px 26px; margin: 0 8px; border-radius: 4px;
  display: flex; align-items: center; gap: 12px; cursor: pointer;
  border-bottom: 1px solid rgba(139,105,20,0.08);
  transition: background .12s;
}
.spell-row:hover { background: rgba(201,168,76,0.06); }
.spell-school-dot {
  width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0;
  box-shadow: 0 0 6px currentColor;
}
.spell-row-name {
  font-family: 'Cinzel', serif; font-size: 14.5px; color: var(--parchment);
  flex: 1; letter-spacing: 0.3px;
}
.spell-row-meta {
  font-family: 'EB Garamond', serif; font-size: 12.5px; font-style: italic;
  color: var(--parchment-dark); opacity: 0.6; flex-shrink: 0;
  display: flex; align-items: center; gap: 8px;
}
.spell-row-concentration {
  font-size: 10px; color: var(--arcane-glow); opacity: 0.9;
}
.spell-row-ritual {
  font-size: 10px; color: var(--gold); opacity: 0.8;
}

.empty-state {
  padding: 60px 26px; text-align: center;
  color: var(--parchment-dark); opacity: 0.5;
  font-family: 'EB Garamond', serif; font-style: italic; font-size: 15px;
}

/* ===== Painel de detalhe da magia (overlay interno) ===== */
.spell-detail-overlay {
  position: absolute; inset: 0; z-index: 10;
  background: rgba(8,5,2,0.55);
  backdrop-filter: blur(3px);
  display: none; align-items: flex-end; justify-content: center;
}
.spell-detail-overlay.open { display: flex; }
.spell-detail {
  background: var(--stone-mid);
  border-top: 1px solid var(--gold-dark);
  width: 100%; max-height: 86%;
  overflow-y: auto;
  box-shadow: 0 -20px 60px rgba(0,0,0,0.8);
  animation: slideUp .22s ease-out;
  position: relative;
}
@keyframes slideUp {
  from { transform: translateY(24px); opacity: 0; }
  to   { transform: translateY(0); opacity: 1; }
}
.spell-detail::-webkit-scrollbar { width: 8px; }
.spell-detail::-webkit-scrollbar-thumb { background: rgba(139,105,20,0.4); border-radius: 4px; }

.spell-detail-head {
  padding: 22px 28px 16px;
  border-bottom: 1px solid rgba(139,105,20,0.25);
  display: flex; justify-content: space-between; align-items: flex-start; gap: 14px;
}
.spell-detail-name {
  font-family: 'Cinzel Decorative', serif; font-size: 20px;
  color: var(--gold-light); letter-spacing: 1px; margin-bottom: 4px;
}
.spell-detail-tag {
  font-family: 'EB Garamond', serif; font-size: 13.5px; font-style: italic;
  color: var(--parchment-dark); opacity: 0.7;
}
.spell-detail-close {
  background: none; border: 1px solid rgba(139,105,20,0.4);
  color: var(--parchment-dark); width: 30px; height: 30px;
  border-radius: 50%; cursor: pointer; font-size: 15px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  transition: all .15s;
}
.spell-detail-close:hover { background: rgba(122,24,24,0.3); color: var(--parchment); border-color: var(--blood-light); }

.spell-detail-stats {
  display: grid; grid-template-columns: repeat(2, 1fr);
  gap: 10px 24px; padding: 18px 28px;
  border-bottom: 1px solid rgba(139,105,20,0.15);
}
.stat-item { display: flex; flex-direction: column; gap: 2px; }
.stat-label {
  font-family: 'Cinzel', serif; font-size: 9.5px; letter-spacing: 1.5px;
  color: var(--gold-dark); text-transform: uppercase;
}
.stat-value {
  font-family: 'EB Garamond', serif; font-size: 14px; color: var(--parchment);
}

.spell-detail-body {
  padding: 20px 28px 28px;
  font-family: 'EB Garamond', serif; font-size: 15.5px; line-height: 1.7;
  color: var(--parchment-dark);
}
.spell-detail-body p { margin: 0; }

.spell-classes-row {
  padding: 0 28px 18px; display: flex; gap: 6px; flex-wrap: wrap;
}
.class-chip {
  font-family: 'Cinzel', serif; font-size: 9.5px; letter-spacing: 1px;
  padding: 3px 9px; border-radius: 20px;
  background: rgba(201,168,76,0.1); border: 1px solid rgba(201,168,76,0.25);
  color: var(--parchment-dark);
}
.class-chip.is-mine {
  background: rgba(201,168,76,0.22); border-color: var(--gold); color: var(--gold-light);
}

/* ===== Botão Aprender Magia ===== */
.learn-btn {
  width: 100%; padding: 11px; border-radius: 3px;
  font-family: 'Cinzel', serif; font-size: 12px; letter-spacing: 1.5px;
  text-transform: uppercase; cursor: pointer; transition: all .15s;
  background: linear-gradient(180deg, var(--gold-dark), #6b4f0f);
  border: 1px solid var(--gold); color: var(--ink);
}
.learn-btn:hover:not(:disabled) {
  background: linear-gradient(180deg, var(--gold), var(--gold-dark));
  box-shadow: 0 0 16px rgba(201,168,76,0.4);
}
.learn-btn:disabled {
  background: rgba(0,0,0,0.3); border-color: rgba(139,105,20,0.3);
  color: var(--parchment-dark); opacity: 0.5; cursor: not-allowed;
}

/* ===== Footer com contagem ===== */
.focus-footer {
  padding: 10px 26px; flex-shrink: 0;
  border-top: 1px solid rgba(139,105,20,0.2);
  background: rgba(0,0,0,0.2);
  font-family: 'Cinzel', serif; font-size: 10.5px; letter-spacing: 1px;
  color: var(--parchment-dark); opacity: 0.6; text-align: center;
}

@media (max-width: 640px) {
  .focus-window { height: 94vh; }
  .focus-header { padding: 14px 16px 12px; }
  .filters { padding: 10px 16px; }
  .char-status { padding: 8px 16px; }
  .level-group-label, .spell-row { padding-left: 16px; padding-right: 16px; }
  .spell-detail-head, .spell-detail-stats, .spell-detail-body, .spell-classes-row { padding-left: 18px; padding-right: 18px; }
  .spell-row-meta { display: none; }
}
</style>
</head>
<body>

<div class="focus-backdrop" id="focusBackdrop">
  <div class="focus-window">
    <div class="corner tl"></div><div class="corner tr"></div>
    <div class="corner bl"></div><div class="corner br"></div>

    <!-- HEADER -->
    <div class="focus-header">
      <div class="focus-title-block">
        <div class="focus-title">🜸 Grimório</div>
        <div class="focus-subtitle" id="focusSubtitle">Carregando ficha do personagem…</div>
      </div>
      <button class="focus-close" id="btnCloseFocus" title="Fechar">✕</button>
    </div>

    <!-- STATUS / SELETOR DE PERSONAGEM -->
    <div class="char-status" id="charStatusBar">
      <span>Personagem:</span>
      <select id="charPicker"></select>
      <span class="badge-class" id="classBadge" style="display:none"></span>
    </div>

    <!-- FILTROS -->
    <div class="filters">
      <div class="search-box">
        <span class="search-icon">🔍</span>
        <input type="text" id="searchInput" placeholder="Buscar magia pelo nome…">
      </div>
      <select class="filter-select" id="schoolSelect">
        <option value="">Todas as escolas</option>
      </select>
      <div class="level-pills" id="levelPills"></div>
    </div>

    <!-- LISTA -->
    <div class="spell-list" id="spellList"></div>

    <!-- FOOTER -->
    <div class="focus-footer" id="focusFooter"></div>

    <!-- DETALHE (overlay interno) -->
    <div class="spell-detail-overlay" id="spellDetailOverlay">
      <div class="spell-detail" id="spellDetail"></div>
    </div>
  </div>
</div>

<script src="../js/spells-data.js"></script>
<script>
// =============================================================
// GRIMÓRIO — Lógica da interface
// =============================================================

// Mapeia o nome de classe salvo na ficha (rpg-interface / home-screen)
// para o nome de classe usado no banco de magias. A ficha usa "Ranger";
// nosso banco usa "Patrulheiro" (nome em PT-BR mais comum nas traduções).
const MAPA_CLASSE = {
  'Ranger': 'Patrulheiro',
  'Patrulheiro': 'Patrulheiro',
  'Bardo': 'Bardo', 'Bruxo': 'Bruxo', 'Clérigo': 'Clérigo', 'Druida': 'Druida',
  'Feiticeiro': 'Feiticeiro', 'Mago': 'Mago', 'Paladino': 'Paladino'
};
// Classes do sistema que não têm acesso a magias (lista de conjuradores)
const CLASSES_SEM_MAGIA = ['Bárbaro', 'Guerreiro', 'Ladino', 'Monge'];

let TODOS_PERSONAGENS = [];
let PERSONAGEM_ATUAL = null;
let CLASSE_ATUAL = null; // nome já mapeado p/ banco de magias

let filtroNivel = null;       // null = todos
let filtroEscola = '';
let filtroBusca = '';

function loadPersonagens() {
  try {
    const raw = localStorage.getItem('forja_personagens');
    let lista = raw ? JSON.parse(raw) : [];
    // Fallback apenas para teste isolado deste arquivo: se não houver
    // nenhum personagem salvo ainda E não vier um id específico pela URL
    // (ex: abrindo este HTML sozinho, sem nunca ter passado pela Forja),
    // criamos exemplos para visualização.
    if (!lista.length && !pegarIdDaUrl()) {
      lista = [
        { id: 'demo1', nome: 'Aldric Stoneheart', sistema: 'dnd5e', dados: { cls: 'Paladino', race: 'Humano', level: 8 } },
        { id: 'demo2', nome: 'Lyra Voss', sistema: 'dnd5e', dados: { cls: 'Mago', race: 'Elfo', level: 7 } },
        { id: 'demo3', nome: 'Finn Trovão', sistema: 'dnd5e', dados: { cls: 'Druida', race: 'Halfling', level: 5 } },
        { id: 'demo4', nome: 'Brohm', sistema: 'dnd5e', dados: { cls: 'Bárbaro', race: 'Meio-Orc', level: 6 } }
      ];
    }
    return lista;
  } catch (e) { return []; }
}

function getClasseDoPersonagem(p) {
  if (!p || !p.dados) return null;
  return p.dados.cls || null;
}

function pegarIdDaUrl() {
  const params = new URLSearchParams(window.location.search);
  return params.get('id');
}

function popularSeletorPersonagens() {
  const picker = document.getElementById('charPicker');
  const dnd = TODOS_PERSONAGENS.filter(p => p.sistema === 'dnd5e');

  if (!dnd.length) {
    picker.innerHTML = '<option value="">Nenhum personagem D&D 5e encontrado</option>';
    return;
  }

  picker.innerHTML = dnd.map(p => {
    const cls = getClasseDoPersonagem(p) || '—';
    return `<option value="${p.id}">${p.nome} (${cls})</option>`;
  }).join('');

  // Prioridade de seleção: 1) ?id= na URL (veio direto da ficha), 2) última seleção manual, 3) primeiro da lista
  const idDaUrl = pegarIdDaUrl();
  const lastId = localStorage.getItem('grimorio_last_char');

  if (idDaUrl && dnd.some(p => p.id === idDaUrl)) {
    picker.value = idDaUrl;
    // Veio de uma ficha específica: trava o seletor pra evitar trocar de personagem por engano
    picker.disabled = true;
    picker.title = 'Aberto a partir da ficha — volte e abra outra ficha para trocar de personagem';
  } else if (lastId && dnd.some(p => p.id === lastId)) {
    picker.value = lastId;
  }
  selecionarPersonagem(picker.value);
}

function selecionarPersonagem(id) {
  PERSONAGEM_ATUAL = TODOS_PERSONAGENS.find(p => p.id === id) || null;
  localStorage.setItem('grimorio_last_char', id || '');

  const classeOriginal = getClasseDoPersonagem(PERSONAGEM_ATUAL);
  CLASSE_ATUAL = classeOriginal ? (MAPA_CLASSE[classeOriginal] || null) : null;

  atualizarHeaderPersonagem(classeOriginal);
  renderizarLista();
}

function atualizarHeaderPersonagem(classeOriginal) {
  const subtitle = document.getElementById('focusSubtitle');
  const badge = document.getElementById('classBadge');

  if (!PERSONAGEM_ATUAL) {
    subtitle.innerHTML = 'Nenhum personagem selecionado — mostrando todas as magias.';
    badge.style.display = 'none';
    return;
  }

  if (CLASSES_SEM_MAGIA.includes(classeOriginal)) {
    subtitle.innerHTML = `<b>${PERSONAGEM_ATUAL.nome}</b> (${classeOriginal}) não possui lista de conjurador — exibindo o grimório completo.`;
    badge.style.display = 'none';
  } else if (CLASSE_ATUAL) {
    subtitle.innerHTML = `Magias disponíveis para <b>${PERSONAGEM_ATUAL.nome}</b>`;
    badge.textContent = classeOriginal;
    badge.style.display = 'inline-flex';
  } else {
    subtitle.innerHTML = `<b>${PERSONAGEM_ATUAL.nome}</b> — classe não reconhecida, exibindo grimório completo.`;
    badge.style.display = 'none';
  }
}

function popularSeletorEscolas() {
  const sel = document.getElementById('schoolSelect');
  Object.keys(ESCOLAS).forEach(key => {
    const opt = document.createElement('option');
    opt.value = key;
    opt.textContent = ESCOLAS[key].nome;
    sel.appendChild(opt);
  });
}

function popularPillsNivel() {
  const wrap = document.getElementById('levelPills');
  const niveisExistentes = [...new Set(MAGIAS.map(m => m.nivel))].sort((a,b)=>a-b);
  wrap.innerHTML = '';
  const allPill = document.createElement('div');
  allPill.className = 'level-pill active';
  allPill.textContent = '✦';
  allPill.title = 'Todos os níveis';
  allPill.onclick = () => { filtroNivel = null; atualizarPillsAtivas(); renderizarLista(); };
  wrap.appendChild(allPill);

  niveisExistentes.forEach(n => {
    const pill = document.createElement('div');
    pill.className = 'level-pill';
    pill.textContent = n === 0 ? 'T' : n;
    pill.title = n === 0 ? 'Truques' : `Nível ${n}`;
    pill.dataset.nivel = n;
    pill.onclick = () => { filtroNivel = n; atualizarPillsAtivas(); renderizarLista(); };
    wrap.appendChild(pill);
  });
}

function atualizarPillsAtivas() {
  const pills = document.querySelectorAll('.level-pill');
  pills.forEach(p => {
    const isAll = !p.dataset.nivel;
    const matches = isAll ? filtroNivel === null : Number(p.dataset.nivel) === filtroNivel;
    p.classList.toggle('active', matches);
  });
}

function magiasFiltradas() {
  let lista = MAGIAS;

  // Filtra por classe do personagem, se houver uma classe de conjurador válida
  if (CLASSE_ATUAL) {
    lista = lista.filter(m => m.classes.includes(CLASSE_ATUAL));
  }

  if (filtroNivel !== null) {
    lista = lista.filter(m => m.nivel === filtroNivel);
  }
  if (filtroEscola) {
    lista = lista.filter(m => m.escola === filtroEscola);
  }
  if (filtroBusca.trim()) {
    const q = filtroBusca.trim().toLowerCase();
    lista = lista.filter(m => m.nome.toLowerCase().includes(q));
  }

  return lista.sort((a,b) => a.nivel - b.nivel || a.nome.localeCompare(b.nome, 'pt-BR'));
}

function nivelLabel(n) {
  return n === 0 ? 'Truques' : `${n}º Círculo`;
}

function renderizarLista() {
  const lista = magiasFiltradas();
  const container = document.getElementById('spellList');
  const footer = document.getElementById('focusFooter');

  if (!lista.length) {
    container.innerHTML = `<div class="empty-state">Nenhuma magia encontrada com esses filtros.<br>Tente ajustar a busca, o nível ou a escola.</div>`;
    footer.textContent = '0 magias exibidas';
    return;
  }

  let html = '';
  let nivelAtual = null;
  lista.forEach(m => {
    if (m.nivel !== nivelAtual) {
      nivelAtual = m.nivel;
      html += `<div class="level-group-label">${nivelLabel(nivelAtual)}</div>`;
    }
    const escola = ESCOLAS[m.escola] || { cor: '#999', nome: m.escola };
    html += `
      <div class="spell-row" onclick="abrirDetalheMagia('${encodeURIComponent(m.nome)}')">
        <span class="spell-school-dot" style="background:${escola.cor}; color:${escola.cor}"></span>
        <span class="spell-row-name">${m.nome}</span>
        <span class="spell-row-meta">
          ${m.concentracao ? '<span class="spell-row-concentration">⬡ Conc.</span>' : ''}
          ${m.ritual ? '<span class="spell-row-ritual">✦ Rit.</span>' : ''}
          <span>${escola.nome}</span>
        </span>
      </div>`;
  });

  container.innerHTML = html;
  footer.textContent = `${lista.length} magia${lista.length === 1 ? '' : 's'} exibida${lista.length === 1 ? '' : 's'}`;
}

function abrirDetalheMagia(nomeEncoded) {
  const nome = decodeURIComponent(nomeEncoded);
  const m = MAGIAS.find(mm => mm.nome === nome);
  if (!m) return;

  const escola = ESCOLAS[m.escola] || { cor: '#999', nome: m.escola };
  const overlay = document.getElementById('spellDetailOverlay');
  const detail = document.getElementById('spellDetail');

  detail.innerHTML = `
    <div class="spell-detail-head">
      <div>
        <div class="spell-detail-name">${m.nome}</div>
        <div class="spell-detail-tag">${nivelLabel(m.nivel)} · ${escola.nome}${m.ritual ? ' (ritual)' : ''}</div>
      </div>
      <button class="spell-detail-close" onclick="fecharDetalheMagia()">✕</button>
    </div>
    <div class="spell-detail-stats">
      <div class="stat-item"><span class="stat-label">Tempo de Conjuração</span><span class="stat-value">${m.tempo}</span></div>
      <div class="stat-item"><span class="stat-label">Alcance</span><span class="stat-value">${m.alcance}</span></div>
      <div class="stat-item"><span class="stat-label">Componentes</span><span class="stat-value">${m.componentes}${m.material ? ' *' : ''}</span></div>
      <div class="stat-item"><span class="stat-label">Duração</span><span class="stat-value">${m.duracao}</span></div>
    </div>
    ${m.material ? `<div style="padding:0 28px 14px; font-size:13px; font-style:italic; color:var(--parchment-dark); opacity:0.65;">* ${m.material}</div>` : ''}
    <div class="spell-detail-body"><p>${m.desc}</p></div>
    <div class="spell-classes-row">
      ${CLASSES_MAGIA.map(c => `<span class="class-chip ${m.classes.includes(c) ? 'is-mine' : ''}">${c}</span>`).join('')}
    </div>
    ${learnSectionHTML(m)}
  `;
  overlay.classList.add('open');
}

// =============================================================
// APRENDER MAGIA
// =============================================================

function statusAprendizado(m) {
  if (!PERSONAGEM_ATUAL) {
    return { podeAprender: false, motivo: 'Selecione um personagem para aprender magias.' };
  }
  const d = PERSONAGEM_ATUAL.dados || {};
  const classeOriginal = getClasseDoPersonagem(PERSONAGEM_ATUAL);

  if (CLASSES_SEM_MAGIA.includes(classeOriginal)) {
    return { podeAprender: false, motivo: `${classeOriginal} não possui lista de conjurador.` };
  }
  if (!CLASSE_ATUAL || !m.classes.includes(CLASSE_ATUAL)) {
    return { podeAprender: false, motivo: `Essa magia não está disponível para ${classeOriginal || 'essa classe'}.` };
  }

  const spells = d.spells || [];
  const jaAprendida = spells.some(s => s.nome === m.nome);
  if (jaAprendida) {
    return { podeAprender: false, jaAprendida: true, motivo: 'Você já conhece esta magia.' };
  }

  // "Aprender" aqui significa "adicionar ao grimório/repertório" — sem limite de
  // quantidade (cobre o caso de homebrews com grimório de páginas infinitas, etc).
  // A única checagem é se o personagem JÁ TEM ACESSO àquele círculo de magia,
  // ou seja, se spellSlots[nivel].max > 0 (calculado pela classe+nível na ficha).
  // Quantas magias ele pode ter PRONTAS PRA USAR ao mesmo tempo é controlado
  // separadamente pelo checkbox "preparada" na aba Combate, limitado pelos
  // Espaços de Magia (ver toggleMagiaPreparada em rpg-interface.js).
  const slotDoNivel = (d.spellSlots && d.spellSlots[m.nivel]) || { max: 0 };
  const maxCirculo = slotDoNivel.max || 0;

  if (maxCirculo === 0) {
    return {
      podeAprender: false,
      motivo: m.nivel === 0
        ? 'Sua classe ainda não tem truques neste nível (verifique classe e nível na ficha).'
        : `Seu personagem ainda não tem acesso a magias de nível ${m.nivel} (verifique classe e nível na ficha).`
    };
  }

  return { podeAprender: true, motivo: 'Disponível para aprender.' };
}

function learnSectionHTML(m) {
  const status = statusAprendizado(m);
  let corDestaque = status.podeAprender ? 'var(--success-light)' : (status.jaAprendida ? 'var(--gold)' : 'var(--blood-light)');

  return `
    <div class="learn-section" style="border-top:1px solid rgba(139,105,20,0.25); padding:18px 28px 24px;">
      <div style="font-family:'EB Garamond',serif; font-size:13px; font-style:italic; color:${corDestaque}; margin-bottom:10px;">
        ${status.jaAprendida ? '✓ ' : (status.podeAprender ? '' : '⚠ ')}${status.motivo || ''}
      </div>
      <button class="learn-btn" ${status.podeAprender ? '' : 'disabled'} onclick="aprenderMagia('${encodeURIComponent(m.nome)}')">
        ${status.jaAprendida ? 'Já Conhecida' : 'Aprender Magia'}
      </button>
    </div>`;
}

function aprenderMagia(nomeEncoded) {
  const nome = decodeURIComponent(nomeEncoded);
  const m = MAGIAS.find(mm => mm.nome === nome);
  if (!m || !PERSONAGEM_ATUAL) return;

  const status = statusAprendizado(m);
  if (!status.podeAprender) return; // segurança extra, botão já estaria desabilitado

  const d = PERSONAGEM_ATUAL.dados;
  if (!d.spells) d.spells = [];
  d.spells.push({ nome: m.nome, nivel: m.nivel, preparada: false, escola: m.escola });

  // Persiste de volta na lista completa salva no localStorage
  const idx = TODOS_PERSONAGENS.findIndex(p => p.id === PERSONAGEM_ATUAL.id);
  if (idx !== -1) TODOS_PERSONAGENS[idx] = PERSONAGEM_ATUAL;
  try {
    localStorage.setItem('forja_personagens', JSON.stringify(TODOS_PERSONAGENS));
  } catch (e) {
    console.error('Falha ao salvar personagem:', e);
    return;
  }

  // Reabre o detalhe para refletir o novo estado (botão vira "Já Conhecida")
  abrirDetalheMagia(encodeURIComponent(m.nome));
  renderizarLista();
}

function fecharDetalheMagia() {
  document.getElementById('spellDetailOverlay').classList.remove('open');
}

// =============================================================
// EVENTOS
// =============================================================
document.getElementById('charPicker').addEventListener('change', (e) => selecionarPersonagem(e.target.value));
document.getElementById('schoolSelect').addEventListener('change', (e) => { filtroEscola = e.target.value; renderizarLista(); });
document.getElementById('searchInput').addEventListener('input', (e) => { filtroBusca = e.target.value; renderizarLista(); });

document.getElementById('btnCloseFocus').addEventListener('click', () => {
  // Se aberto como iframe dentro da ficha (janela pai), fecha o overlay.
  // Caso contrário (standalone), apenas esconde a janela local.
  if (window.parent && window.parent !== window && typeof window.parent.fecharGrimorio === 'function') {
    window.parent.fecharGrimorio();
  } else {
    document.getElementById('focusBackdrop').style.display = 'none';
  }
});

document.getElementById('spellDetailOverlay').addEventListener('click', (e) => {
  if (e.target.id === 'spellDetailOverlay') fecharDetalheMagia();
});

document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    const overlay = document.getElementById('spellDetailOverlay');
    if (overlay.classList.contains('open')) fecharDetalheMagia();
  }
});

// =============================================================
// INICIALIZAÇÃO
// =============================================================
function init() {
  TODOS_PERSONAGENS = loadPersonagens();
  popularSeletorEscolas();
  popularPillsNivel();
  popularSeletorPersonagens();
  renderizarLista();
}
init();
</script>
